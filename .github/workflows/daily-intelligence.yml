name: Daily outbreak intelligence

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-outbreak-intelligence
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Refresh official counts and daily news index
        run: python scripts/update_data.py
      - name: Validate source scopes and required fields
        run: node scripts/validate-live-data.mjs
      - name: Commit a changed snapshot
        run: |
          if git diff --quiet -- public/data/live.json; then
            echo "No source changes to commit."
            exit 0
          fi
          git config user.name "outbreak-atlas-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/live.json
          git commit -m "data: refresh daily Cyclospora snapshot"
          git push
